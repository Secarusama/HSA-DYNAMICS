<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSA Dynamics - CRM Rifas v30</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; min-height: 100vh; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://i.ibb.co/G3fNGKF7/duende.jpg'); background-size: cover; background-position: center; opacity: 0.12; z-index: -1; }
        #contenedorTabla { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 5px; padding: 12px; background-color: rgba(10, 10, 10, 0.9); border-radius: 15px; border: 1px solid #1a1a1a; width: 100%; }
        .numero-bola { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: all 0.2s ease; font-size: 0.75rem; font-weight: 900; user-select: none; border: 1px solid #1a1a1a; color: #ffffff; position: relative; overflow: hidden; background-size: cover; background-position: center; }
        .numero-bola:active { transform: scale(0.9); }
        .libre { background: linear-gradient(145deg, #064e3b, #022c22); border-color: #059669; } 
        .seleccionado { background: #3b82f6 !important; border-color: #ffffff; transform: scale(1.1); z-index: 10; box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        .vendido { background-image: url('https://i.ibb.co/G3fNGKF7/duende.jpg'); color: transparent !important; border-color: #71ef44; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        #barraAccionFija { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 95%; max-width: 450px; }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        textarea, input, select { background-color: #111 !important; border: 1px solid #262626 !important; color: white !important; font-size: 12px !important; }
        #tooltipGlobal { 
            position: fixed; display: none; background: rgba(15, 15, 15, 0.98); 
            color: white; padding: 15px; border-radius: 16px; z-index: 99999; 
            pointer-events: none; width: 240px; border: 1px solid #444; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.9); backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="p-2 pb-32">
    <div id="tooltipGlobal"></div>
    
    <div class="max-w-[1200px] mx-auto">
        <div class="bg-black/80 p-4 rounded-2xl border border-[#1a1a1a] shadow-2xl mb-4 backdrop-blur-sm">
            <div class="flex justify-between items-center mb-4 border-b border-[#1a1a1a] pb-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl overflow-hidden border border-emerald-500">
                        <img src="https://i.ibb.co/G3fNGKF7/duende.jpg" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h1 class="text-lg font-black text-white leading-none">HSA <span class="text-emerald-500">DYNAMICS</span></h1>
                        <span class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest">Sorteos</span>
                    </div>
                </div>
                <div class="flex gap-1 flex-wrap justify-end">
                    <button onclick="compartirDisponibles()" class="p-2 bg-emerald-900/20 text-emerald-500 rounded-lg border border-emerald-800/30 text-[8px] font-bold uppercase">🟢 Libres</button>
                    <button onclick="enviarPendientesWhatsApp()" class="p-2 bg-rose-900/20 text-rose-500 rounded-lg border border-rose-800/30 text-[8px] font-bold uppercase">🔴 Deudores</button>
                    <button onclick="exportarExcel()" class="p-2 bg-zinc-800 text-zinc-300 rounded-lg border border-zinc-700 text-[8px] font-bold uppercase">📥 Excel</button>
                    <button onclick="resetearSistema()" class="p-2 bg-zinc-900 text-zinc-600 rounded-lg border border-zinc-800 text-[8px] font-bold uppercase">🗑️ Reset</button>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <textarea id="confNombre" oninput="validarConfig()" rows="2" placeholder="Premio..." class="col-span-2 w-full p-2 rounded-xl text-xs"></textarea>
                <input type="number" id="confValor" oninput="validarConfig()" placeholder="$ Precio" class="p-2 rounded-lg text-xs">
                <input type="date" id="confFecha" oninput="validarConfig()" class="p-2 rounded-lg text-xs">
                <select id="rangoRifa" onchange="cambiarRango()" class="col-span-2 p-2 rounded-lg text-xs">
                    <option value="100">100 Números (00-99)</option>
                    <option value="1000">1000 Números (000-999)</option>
                </select>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2 mb-4 text-center">
            <div class="bg-black/70 p-2 rounded-xl border border-[#1a1a1a]"><p class="text-[8px] text-zinc-500 font-bold uppercase">Caja</p><p id="statRecaudado" class="font-black text-emerald-500 text-xs">$0</p></div>
            <div class="bg-black/70 p-2 rounded-xl border border-[#1a1a1a]"><p class="text-[8px] text-zinc-500 font-bold uppercase">Deuda</p><p id="statDeuda" class="font-black text-rose-500 text-xs">$0</p></div>
            <div class="bg-black/70 p-2 rounded-xl border border-[#1a1a1a]"><p class="text-[8px] text-zinc-500 font-bold uppercase">Venta</p><p id="statVendidos" class="font-black text-white text-xs">0</p></div>
            <div class="bg-black/70 p-2 rounded-xl border border-[#1a1a1a]"><p class="text-[8px] text-zinc-500 font-bold uppercase">Prog</p><p id="statProgreso" class="font-black text-blue-500 text-xs">0%</p></div>
        </div>

        <input type="text" id="buscador" onkeyup="filtrarNumeros()" placeholder="🔍 Buscar cliente o número..." class="w-full bg-black/80 border border-[#1a1a1a] p-3 rounded-xl text-xs text-white mb-4 outline-none">
        <div id="contenedorTabla"></div>
    </div>

    <div id="barraAccionFija">
        <div class="glass p-3 rounded-[2rem] flex justify-between items-center shadow-2xl">
            <div class="flex flex-col items-center px-4">
                <span id="countSeleccion" class="text-xl font-black text-emerald-500 leading-none">0</span>
                <span class="text-[8px] uppercase font-bold text-zinc-500">Tickets</span>
            </div>
            <button onclick="abrirModalMulti()" id="btnVender" disabled class="bg-zinc-800 text-zinc-500 px-8 py-3 rounded-[1.5rem] font-black text-[10px] uppercase shadow-lg transition-all">VENDER</button>
        </div>
    </div>

    <div id="modalRegistro" class="hidden fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center p-4 z-[10000]">
        <div class="bg-[#0a0a0a] p-6 rounded-3xl border border-white/10 w-full max-w-xs shadow-2xl">
            <h2 class="text-sm font-black text-white uppercase text-center mb-4">Registro de Venta</h2>
            <div class="space-y-3">
                <input type="text" id="nombreCliente" class="w-full p-3 rounded-xl text-xs" placeholder="Nombre">
                <input type="tel" id="whatsappCliente" class="w-full p-3 rounded-xl text-xs" placeholder="WhatsApp">
                <select id="estadoPago" onchange="toggleAbono()" class="w-full p-3 rounded-xl text-xs font-bold">
                    <option value="total">PAGÓ TODO 🟢</option>
                    <option value="abono">ABONO 🟡</option>
                    <option value="nada">DEBE 🔴</option>
                </select>
                <input type="number" id="montoAbonado" class="hidden w-full p-3 rounded-xl border border-yellow-700/50 text-yellow-500 font-bold text-center" placeholder="¿Cuánto abonó?">
                <button onclick="guardarVenta(true)" class="w-full bg-emerald-600 py-3 rounded-xl font-black text-white text-[10px] uppercase">✅ GUARDAR Y ENVIAR</button>
                <button onclick="guardarVenta(false)" class="w-full bg-zinc-800 py-3 rounded-xl font-black text-zinc-400 text-[10px] uppercase border border-white/5">💾 SOLO GUARDAR</button>
                <button onclick="cerrarModal()" class="w-full py-2 text-zinc-600 text-[9px] uppercase font-bold">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="modalPago" class="hidden fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center p-4 z-[10001]">
        <div class="bg-[#0a0a0a] p-6 rounded-3xl border border-white/10 w-full max-w-xs shadow-2xl">
            <h2 id="pagoTitulo" class="text-sm font-black text-white uppercase text-center mb-1">Actualizar Pago</h2>
            <p id="pagoSubtitulo" class="text-[10px] text-zinc-500 text-center mb-4 italic"></p>
            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-white/5 mb-4 text-center">
                <p class="text-[9px] text-zinc-500 uppercase font-bold">Saldo Pendiente</p>
                <p id="pagoDeudaActual" class="text-2xl font-black text-rose-500">$0</p>
            </div>
            <div class="space-y-3">
                <input type="number" id="nuevoAbonoInput" class="w-full p-3 rounded-xl text-xs" placeholder="$ Sumar nuevo abono">
                <button onclick="procesarPagoParcial()" class="w-full bg-yellow-600 py-3 rounded-xl font-black text-white text-[10px] uppercase">➕ REGISTRAR ABONO</button>
                <button onclick="procesarPagoTotal()" class="w-full bg-emerald-600 py-3 rounded-xl font-black text-white text-[10px] uppercase">💰 PAGO COMPLETO</button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="confirmarLiberar()" class="py-3 bg-rose-900/20 text-rose-500 rounded-xl font-bold text-[9px] uppercase border border-rose-900/30">🗑️ LIBERAR</button>
                    <button onclick="cerrarModalPago()" class="py-3 bg-zinc-800 text-zinc-400 rounded-xl font-bold text-[9px] uppercase border border-white/5">CERRAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rifaDatos = JSON.parse(localStorage.getItem('rifa_onyx_v21')) || {};
        let config = JSON.parse(localStorage.getItem('rifa_conf_v21')) || {nombre:'', valor:'', fecha:'', rango: '100'};
        let seleccionados = [];
        let numeroActivoParaPago = null;
        const tooltip = document.getElementById('tooltipGlobal');

        function inicializar() {
            document.getElementById('confNombre').value = config.nombre;
            document.getElementById('confValor').value = config.valor;
            document.getElementById('confFecha').value = config.fecha;
            document.getElementById('rangoRifa').value = config.rango;
            generarTabla();
        }

        function generarTabla() {
            const limite = parseInt(config.rango);
            const contenedor = document.getElementById('contenedorTabla');
            contenedor.innerHTML = '';
            for (let i = 0; i < limite; i++) {
                const numStr = i.toString().padStart(limite === 1000 ? 3 : 2, '0');
                const info = rifaDatos[numStr];
                const bola = document.createElement('div');
                bola.className = `numero-bola ${info ? 'vendido' : 'libre'}`;
                if (seleccionados.includes(numStr)) bola.classList.add('seleccionado');
                bola.innerHTML = numStr;
                bola.dataset.cliente = info ? info.nombre.toLowerCase() : '';
                
                if (info) {
                    bola.onclick = () => abrirGestionPago(numStr);
                    bola.onmouseenter = (e) => mostrarTooltip(e, numStr);
                    bola.onmousemove = (e) => moverTooltip(e);
                    bola.onmouseleave = () => ocultarTooltip();
                } else {
                    bola.onclick = () => manejarSeleccion(numStr, bola);
                }
                contenedor.appendChild(bola);
            }
            actualizarDashboard();
        }

        // --- TOOLTIP DETALLADO (RESTAURADO) ---
        function mostrarTooltip(e, num) {
            const i = rifaDatos[num];
            if(!i) { ocultarTooltip(); return; }

            const totalVenta = i.numerosEnVenta.length * parseFloat(config.valor);
            const abonado = i.pago === 'total' ? totalVenta : i.abonoTotal;
            const deuda = totalVenta - abonado;
            const colorEstado = i.pago === 'total' ? 'text-emerald-400' : 'text-rose-500';
            
            tooltip.style.display = 'block';
            tooltip.innerHTML = `
                <div style="border-bottom:1px solid #333; padding-bottom:8px; margin-bottom:8px;">
                    <div style="font-size:9px; color:#666; font-weight:bold; text-transform:uppercase;">Cliente</div>
                    <div style="font-weight:900; font-size:14px; color:white;">${i.nombre}</div>
                    <div style="font-size:10px; color:#10b981;">📱 WhatsApp: ${i.whatsapp}</div>
                </div>
                <div style="font-size:11px; line-height:1.6; color:#ccc;">
                    <div style="display:flex; justify-content:space-between;"><span>🔢 Tickets:</span><b style="color:white;">${i.numerosEnVenta.join(", ")}</b></div>
                    <div style="display:flex; justify-content:space-between;"><span>💰 Total:</span><b style="color:white;">$${totalVenta.toLocaleString()}</b></div>
                    <div style="display:flex; justify-content:space-between;"><span>✅ Abonado:</span><b style="color:#10b981;">$${abonado.toLocaleString()}</b></div>
                    <div style="display:flex; justify-content:space-between; border-top:1px solid #222; margin-top:5px; padding-top:5px;">
                        <span>🚩 SALDO:</span><b class="${colorEstado}">$${deuda.toLocaleString()}</b>
                    </div>
                </div>
            `;
            moverTooltip(e);
        }

        function moverTooltip(e) {
            let x = e.clientX + 15; let y = e.clientY + 15;
            if (x + 250 > window.innerWidth) x = e.clientX - 265;
            if (y + 150 > window.innerHeight) y = e.clientY - 160;
            tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
        }

        function ocultarTooltip() { tooltip.style.display = 'none'; }

        // --- GESTIÓN DE PAGOS ---
        function abrirGestionPago(num) {
            numeroActivoParaPago = num;
            const i = rifaDatos[num];
            const totalVenta = i.numerosEnVenta.length * parseFloat(config.valor);
            const abonado = i.pago === 'total' ? totalVenta : i.abonoTotal;
            const deuda = totalVenta - abonado;

            document.getElementById('pagoTitulo').innerText = i.nombre;
            document.getElementById('pagoSubtitulo').innerText = `Tickets: ${i.numerosEnVenta.join(", ")}`;
            document.getElementById('pagoDeudaActual').innerText = `$${deuda.toLocaleString()}`;
            document.getElementById('modalPago').classList.remove('hidden');
            ocultarTooltip();
        }

        function procesarPagoParcial() {
            const monto = parseFloat(document.getElementById('nuevoAbonoInput').value);
            if (!monto || monto <= 0) return;
            const idV = rifaDatos[numeroActivoParaPago].idVenta;
            Object.keys(rifaDatos).forEach(n => {
                if(rifaDatos[n].idVenta === idV) {
                    rifaDatos[n].abonoTotal += monto;
                    rifaDatos[n].pago = 'abono';
                    if(rifaDatos[n].abonoTotal >= (rifaDatos[n].numerosEnVenta.length * config.valor)) rifaDatos[n].pago = 'total';
                }
            });
            guardarLocal(); cerrarModalPago(); generarTabla();
        }

        function procesarPagoTotal() {
            const idV = rifaDatos[numeroActivoParaPago].idVenta;
            Object.keys(rifaDatos).forEach(n => { if(rifaDatos[n].idVenta === idV) rifaDatos[n].pago = 'total'; });
            guardarLocal(); cerrarModalPago(); generarTabla();
        }

        function confirmarLiberar() {
            if(confirm("¿Liberar estos tickets?")) {
                const idV = rifaDatos[numeroActivoParaPago].idVenta;
                Object.keys(rifaDatos).forEach(n => { if(rifaDatos[n].idVenta === idV) delete rifaDatos[n]; });
                guardarLocal(); cerrarModalPago(); generarTabla();
            }
        }

        function cerrarModalPago() { document.getElementById('modalPago').classList.add('hidden'); }

        // --- RESTO DE FUNCIONES ---
        function manejarSeleccion(num, el) {
            const idx = seleccionados.indexOf(num);
            if (idx > -1) { seleccionados.splice(idx, 1); el.classList.remove('seleccionado'); }
            else { seleccionados.push(num); el.classList.add('seleccionado'); }
            document.getElementById('countSeleccion').innerText = seleccionados.length;
            validarConfig();
        }

        function guardarVenta(enviarWhatsApp) {
            const nom = document.getElementById('nombreCliente').value || "Cliente";
            const tel = document.getElementById('whatsappCliente').value;
            const pag = document.getElementById('estadoPago').value;
            let abo = parseFloat(document.getElementById('montoAbonado').value) || 0;
            const ns = [...seleccionados];
            if(pag === 'total') abo = ns.length * config.valor;
            ns.forEach(n => { rifaDatos[n] = { nombre: nom, whatsapp: tel || "S/N", pago: pag, abonoTotal: abo, numerosEnVenta: ns, idVenta: Date.now() }; });
            guardarLocal();
            if(enviarWhatsApp && tel) enviarWS(nom, tel, pag, abo, ns);
            cerrarModal(); seleccionados = []; document.getElementById('countSeleccion').innerText = "0"; generarTabla();
        }

        function toggleAbono() { document.getElementById('montoAbonado').classList.toggle('hidden', document.getElementById('estadoPago').value !== 'abono'); }
        function abrirModalMulti() { document.getElementById('modalRegistro').classList.remove('hidden'); }
        function cerrarModal() { document.getElementById('modalRegistro').classList.add('hidden'); }
        function guardarLocal() { localStorage.setItem('rifa_onyx_v21', JSON.stringify(rifaDatos)); }
        function cambiarRango() { config.rango = document.getElementById('rangoRifa').value; validarConfig(); generarTabla(); }

        function validarConfig() {
            config.nombre = document.getElementById('confNombre').value;
            config.valor = document.getElementById('confValor').value;
            config.fecha = document.getElementById('confFecha').value;
            config.rango = document.getElementById('rangoRifa').value;
            localStorage.setItem('rifa_conf_v21', JSON.stringify(config));
            const btn = document.getElementById('btnVender');
            btn.disabled = !(config.nombre && config.valor > 0 && seleccionados.length > 0);
            btn.className = btn.disabled ? "bg-zinc-800 text-zinc-500 px-8 py-3 rounded-[1.5rem] font-black text-[10px] uppercase" : "bg-emerald-600 text-white px-8 py-3 rounded-[1.5rem] font-black text-[10px] uppercase cursor-pointer";
            actualizarDashboard();
        }

        function actualizarDashboard() {
            let r = 0, d = 0, p = new Set();
            Object.keys(rifaDatos).forEach(n => {
                const v = rifaDatos[n];
                if (!p.has(v.idVenta)) {
                    const t = v.numerosEnVenta.length * config.valor;
                    const a = v.pago === 'total' ? t : v.abonoTotal;
                    r += a; d += (t - a);
                    p.add(v.idVenta);
                }
            });
            document.getElementById('statRecaudado').innerText = `$${r.toLocaleString()}`;
            document.getElementById('statDeuda').innerText = `$${d.toLocaleString()}`;
            document.getElementById('statVendidos').innerText = Object.keys(rifaDatos).length;
            document.getElementById('statProgreso').innerText = Math.round((Object.keys(rifaDatos).length / (parseInt(config.rango)||100)) * 100) + "%";
        }

        function filtrarNumeros() {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.numero-bola').forEach(bola => {
                const ok = bola.innerText.includes(b) || (bola.dataset.cliente && bola.dataset.cliente.includes(b));
                bola.style.opacity = ok ? "1" : "0.1";
            });
        }

        function enviarWS(nom, tel, pag, abo, ns) {
            const vt = ns.length * config.valor;
            const pagado = pag === 'total' ? vt : abo;
            const msg = `*🎫 RECIBO HSA*%0A👤 *Cliente:* ${nom}%0A🔢 *Tickets:* ${ns.join(", ")}%0A💰 *Total:* $${vt}%0A✅ *Abonado:* $${pagado}%0A🚩 *Resta:* $${vt-pagado}%0A🍀 ¡Suerte!`;
            window.open(`https://api.whatsapp.com/send?phone=${tel.replace(/\D/g,'')}&text=${msg}`);
        }

        function exportarExcel() {
            let csv = "Numero;Cliente;WhatsApp;Estado;Debe\n";
            Object.keys(rifaDatos).sort((a,b)=>a-b).forEach(n => {
                const d = rifaDatos[n];
                const totalV = d.numerosEnVenta.length * config.valor;
                const pagado = d.pago === 'total' ? totalV : d.abonoTotal;
                csv += `${n};${d.nombre};${d.whatsapp};${d.pago};${totalV-pagado}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = window.URL.createObjectURL(blob);
            a.download = `Reporte_HSA.csv`; a.click();
        }

        function resetearSistema() { if(confirm("⚠️ ¿BORRAR TODO?")) { rifaDatos = {}; localStorage.removeItem('rifa_onyx_v21'); generarTabla(); } }

        function compartirDisponibles() {
            const limite = parseInt(config.rango);
            let libres = [];
            for (let i = 0; i < limite; i++) {
                const n = i.toString().padStart(limite === 1000 ? 3 : 2, '0');
                if (!rifaDatos[n]) libres.push(n);
            }
            window.open(`https://api.whatsapp.com/send?text=*🍀 TICKETS LIBRES:*%0A${libres.slice(0, 50).join(" - ")}`);
        }

        function enviarPendientesWhatsApp() {
            let res = "*🚩 DEUDORES HSA:*%0A";
            let p = new Set();
            Object.keys(rifaDatos).forEach(n => {
                const v = rifaDatos[n];
                if (v.pago !== 'total' && !p.has(v.idVenta)) {
                    const pen = (v.numerosEnVenta.length * config.valor) - v.abonoTotal;
                    res += `%0A👤 ${v.nombre} (${v.numerosEnVenta.join(",")})%0A💰 Debe: $${pen.toLocaleString()}%0A`;
                    p.add(v.idVenta);
                }
            });
            window.open(`https://api.whatsapp.com/send?text=${res}`);
        }

        inicializar();
    </script>
</body>
</html>

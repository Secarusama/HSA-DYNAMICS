        const URL_DUENDE = "https://images.weserv.nl/?url=i.ibb.co/HL9PDYfW/duende.jpg";
        let rifaDatos = JSON.parse(localStorage.getItem('rifa_onyx_v21')) || {};
        let config = JSON.parse(localStorage.getItem('rifa_conf_v21')) || {nombre:'', valor:'', fecha:'', rango: '100'};
        let seleccionados = [];
        let numeroActivoParaPago = null;

        function inicializar() {
    // 1. CARGA DESDE LA NUBE (Firebase)
    // Usamos el "puente" que creamos arriba en el <head>
    if (window.escucharNube) {
        window.escucharNube((data) => {
            if (data) {
                // Actualiza tus datos globales con lo que viene de internet
                rifaDatos = data; 
                // Redibuja la tabla para que todos vean los cambios al instante
                generarTabla(); 
            }
        });
    }

    // 2. CARGA TU CONFIGURACIÓN (Tu lógica original)
    // Esto mantiene los nombres, precios y fechas que tú definiste
    document.getElementById('confNombre').value = config.nombre;
    document.getElementById('confValor').value = config.valor;
    document.getElementById('confFecha').value = config.fecha;
    document.getElementById('rangoRifa').value = config.rango;

    // 3. DIBUJO INICIAL
    // Genera la tabla por primera vez al abrir la página
    generarTabla();
}

        // --- PDF AGRUPADO POR CLIENTE ---
        async function exportarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // 1. Logo y Título de la Empresa
    try {
        const img = document.getElementById('logoApp');
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const base64Img = canvas.toDataURL('image/jpeg');
        doc.addImage(base64Img, 'JPEG', 14, 10, 20, 20);
    } catch (e) { 
        console.warn("Logo no disponible"); 
    }

    doc.setFontSize(18);
    doc.setTextColor(40);
    doc.text(`REPORTES HSA DYNAMICS`, 35, 15);
    doc.text(`SORTEOS DIARIOS`, 35, 22);

    // 2. Recopilación y Cálculo de datos
    const listaVentas = [];
    const idsProcesados = new Set();
    const numerosSorteados = Object.keys(rifaDatos).sort((a, b) => a - b);

    numerosSorteados.forEach(n => {
        const d = rifaDatos[n];
        if (!idsProcesados.has(d.idVenta)) {
            const vTicket = parseFloat(config.valor) || 0;
            const cantidad = d.numerosEnVenta.length;
            const totalVenta = cantidad * vTicket;
            
            const abonado = d.pago === 'total' ? totalVenta : (parseFloat(d.abonoTotal) || 0);
            const deuda = totalVenta - abonado;

            listaVentas.push({
                numeros: d.numerosEnVenta.join(", "),
                valorUn: vTicket,
                nombre: d.nombre,
                abonado: abonado,
                deuda: deuda, // Este valor define el color
                whatsapp: d.whatsapp || "S/N"
            });
            idsProcesados.add(d.idVenta);
        }
    });

    // 3. LOGICA DE ORDENAMIENTO (De mayor deuda a menor deuda)
    listaVentas.sort((a, b) => b.deuda - a.deuda);

    const filas = listaVentas.map(item => [
        item.numeros,
        `$${item.valorUn.toLocaleString()}`,
        item.nombre,
        `$${item.abonado.toLocaleString()}`,
        `$${item.deuda.toLocaleString()}`,
        item.whatsapp
    ]);

    // 4. Generar la Tabla con resaltado condicional
    doc.autoTable({
        startY: 40,
        head: [['Números', 'Valor Un.', 'Cliente', 'Abono', 'Deuda', 'Celular']],
        body: filas,
        theme: 'grid',
        headStyles: { fillColor: [20, 20, 20], textColor: 255 },
        styles: { fontSize: 10 },
        columnStyles: {
            0: { cellWidth: 35 }, 
            2: { fontStyle: 'bold' },
            4: { fontStyle: 'bold' }
        },
        // --- ESTA ES LA PARTE QUE PINTA LA FILA DE ROJO ---
        didParseCell: function(data) {
            // Verificamos si es una celda del cuerpo (no el encabezado)
            if (data.section === 'body') {
                // La deuda está en la columna índice 4 de nuestra lista original (item.deuda)
                // Obtenemos el objeto de la fila actual de nuestra listaVentas ordenada
                const filaActual = listaVentas[data.row.index];
                
                if (filaActual && filaActual.deuda > 0) {
                    // Pintamos el fondo de la celda de un rojo suave para que se lea el texto
                    data.cell.styles.fillColor = [255, 230, 230]; 
                    // Opcional: poner el texto de la deuda en rojo fuerte
                    if (data.column.index === 4) {
                        data.cell.styles.textColor = [200, 0, 0];
                    }
                }
            }
        }
    });

    doc.save(`Reporte_Cobro_HSA.pdf`);
}

        // --- TOOLTIP ---
        function mostrarTooltip(e, num) {
            const i = rifaDatos[num]; if(!i) return;
            const vt = i.numerosEnVenta.length * (parseFloat(config.valor) || 0);
            const ab = i.pago === 'total' ? vt : (i.abonoTotal || 0);
            const saldo = vt - ab;
            
            tooltip.style.display = 'block';
            tooltip.innerHTML = `
                <div class="space-y-2">
                    <div>
                        <p class="text-[10px] text-zinc-500 uppercase font-black">CLIENTE</p>
                        <p class="text-lg font-black text-white leading-tight">${i.nombre}</p>
                        <p class="text-emerald-500 text-[10px] font-bold">📱 ${i.whatsapp || 'S/N'}</p>
                    </div>
                    <div class="border-t border-zinc-800 pt-2 space-y-1">
                        <div class="flex justify-between text-[11px]"><span class="text-zinc-400 font-bold">🔢 Tickets:</span><span class="text-white font-black">${i.numerosEnVenta.join(", ")}</span></div>
                        <div class="flex justify-between text-[11px]"><span class="text-zinc-400 font-bold">💰 Total:</span><span class="text-white font-black">$${vt.toLocaleString()}</span></div>
                        <div class="flex justify-between text-[11px]"><span class="text-zinc-400 font-bold">✅ Abonado:</span><span class="text-emerald-500 font-black">$${ab.toLocaleString()}</span></div>
                    </div>
                    <div class="border-t border-zinc-800 pt-2 flex justify-between items-center"><span class="text-[10px] text-zinc-400 font-black uppercase">🚩 SALDO:</span><span class="text-lg font-black ${saldo > 0 ? 'text-rose-500' : 'text-emerald-500'}">$${saldo.toLocaleString()}</span></div>
                </div>`;
            moverTooltip(e);
        }

        function moverTooltip(e) { tooltip.style.left = (e.clientX + 15) + 'px'; tooltip.style.top = (e.clientY + 15) + 'px'; }
        function ocultarTooltip() { tooltip.style.display = 'none'; }

        // --- FUNCIONES CORE ---
        async function seleccionarContacto() {
    // Verificamos si el navegador soporta esta función
    const supported = ('contacts' in navigator && 'ContactsManager' in window);
    
    if (!supported) {
        alert("Tu navegador o dispositivo no soporta la selección de contactos directa.");
        return;
    }

    const props = ['name', 'tel'];
    try {
        const contacts = await navigator.contacts.select(props, { multiple: false });
        if (contacts.length > 0) {
            const contact = contacts[0];
            // Llenamos los campos (asegúrate que los IDs sean correctos)
            if (contact.name && contact.name.length > 0) {
                document.getElementById('nombreCliente').value = contact.name[0];
            }
            if (contact.tel && contact.tel.length > 0) {
                // Limpiamos espacios para el WhatsApp
                document.getElementById('whatsappCliente').value = contact.tel[0].replace(/\s+/g, '');
            }
        }
    } catch (ex) {
        console.log("Error o cancelación al elegir contacto:", ex);
    }
}

        function generarTabla() {
            const limite = parseInt(config.rango);
            const contenedor = document.getElementById('contenedorTabla');
            contenedor.innerHTML = '';
            for (let i = 0; i < limite; i++) {
                const numStr = i.toString().padStart(limite === 1000 ? 3 : 2, '0');
                const info = rifaDatos[numStr];
                const bola = document.createElement('div');
                bola.className = `numero-bola ${info ? 'vendido' : 'libre'}`;
                if (seleccionados.includes(numStr)) bola.classList.add('seleccionado');
                bola.dataset.cliente = info ? info.nombre.toLowerCase() : '';
                bola.innerHTML = `<span class="num-text">${numStr}</span>`;
                if (info) {
                    bola.innerHTML += `<img src="${URL_DUENDE}" crossorigin="anonymous" style="width:100%; height:100%; object-fit:cover; position:absolute; inset:0; border-radius:50%;">`;
                    bola.onclick = () => abrirGestionPago(numStr);
                    bola.onmouseenter = (e) => mostrarTooltip(e, numStr);
                    bola.onmousemove = (e) => moverTooltip(e);
                    bola.onmouseleave = () => ocultarTooltip();
                } else {
                    bola.onclick = () => manejarSeleccion(numStr, bola);
                }
                contenedor.appendChild(bola);
            }
            actualizarDashboard();
        }

        function abrirGestionPago(num) {
    numeroActivoParaPago = num;
    const i = rifaDatos[num];
    if (!i) return;

    const vt = i.numerosEnVenta.length * parseFloat(config.valor);
    const ab = i.pago === 'total' ? vt : (i.abonoTotal || 0);
    
    document.getElementById('pagoTitulo').innerText = i.nombre;
    
    const contenedorBotones = document.getElementById('pagoSubtitulo');
    contenedorBotones.innerHTML = ''; 
    contenedorBotones.className = "flex flex-wrap justify-center gap-2 mb-4 mt-2";

    i.numerosEnVenta.forEach(n => {
        const btn = document.createElement('button');
        btn.innerText = n;
        btn.className = "px-3 py-1.5 bg-zinc-900 text-zinc-300 border border-white/10 rounded-lg font-black text-[11px] hover:bg-rose-600/20 hover:text-rose-500 hover:border-rose-500/50 transition-all cursor-pointer";
        
        // Pasamos 'n' correctamente
        btn.onclick = () => liberarNumeroEspecifico(n);
        
        contenedorBotones.appendChild(btn);
    });

    document.getElementById('pagoDeudaActual').innerText = `$${(vt - ab).toLocaleString()}`;
    document.getElementById('modalPago').classList.remove('hidden');
}

function liberarNumeroEspecifico(numParaBorrar) {
    // 1. Confirmación (Corregido el nombre de la variable aquí)
    if (!confirm(`⚠️ ¿Liberar solo el número ${numParaBorrar}?`)) return;

    const datos = rifaDatos[numParaBorrar];
    if (!datos) return;

    const idVentaActual = datos.idVenta;

    // 2. Limpieza de "hermanos"
    Object.keys(rifaDatos).forEach(n => {
        if (rifaDatos[n].idVenta === idVentaActual) {
            rifaDatos[n].numerosEnVenta = rifaDatos[n].numerosEnVenta.filter(num => num !== numParaBorrar);
        }
    });

    // 3. Borrar de la base de datos
    delete rifaDatos[numParaBorrar];

    // 4. Guardar y refrescar
    guardarLocal();
    generarTabla();

    // 5. Actualizar el Modal
    const quedaAlguno = Object.keys(rifaDatos).find(n => rifaDatos[n].idVenta === idVentaActual);
    if (quedaAlguno) {
        abrirGestionPago(quedaAlguno); 
    } else {
        cerrarModalPago(); 
    }
}
      // Mantenemos esta por si quieres borrar todos los números del cliente de un solo clic
function confirmarLiberar() {
    if(confirm("¿Liberar TODOS los números de este cliente?")) {
        const idV = rifaDatos[numeroActivoParaPago].idVenta;
        Object.keys(rifaDatos).forEach(n => { 
            if(rifaDatos[n].idVenta === idV) delete rifaDatos[n]; 
        });
        guardarLocal(); 
        cerrarModalPago(); 
        generarTabla();
    }
}
        function procesarPagoParcial() {
            const m = parseFloat(document.getElementById('nuevoAbonoInput').value); if (!m) return;
            const idV = rifaDatos[numeroActivoParaPago].idVenta;
            Object.keys(rifaDatos).forEach(n => {
                if(rifaDatos[n].idVenta === idV) {
                    rifaDatos[n].abonoTotal += m;
                    rifaDatos[n].pago = (rifaDatos[n].abonoTotal >= (rifaDatos[n].numerosEnVenta.length * config.valor)) ? 'total' : 'abono';
                }
            });
            guardarLocal(); cerrarModalPago(); generarTabla();
        }

        function procesarPagoTotal() {
            const idV = rifaDatos[numeroActivoParaPago].idVenta;
            Object.keys(rifaDatos).forEach(n => { if(rifaDatos[n].idVenta === idV) rifaDatos[n].pago = 'total'; });
            guardarLocal(); cerrarModalPago(); generarTabla();
        }

        function confirmarLiberar() {
            if(confirm("¿Liberar estos números?")) {
                const idV = rifaDatos[numeroActivoParaPago].idVenta;
                Object.keys(rifaDatos).forEach(n => { if(rifaDatos[n].idVenta === idV) delete rifaDatos[n]; });
                guardarLocal(); cerrarModalPago(); generarTabla();
            }
        }

        function cerrarModalPago() { document.getElementById('modalPago').classList.add('hidden'); }
        function manejarSeleccion(num, el) {
            const idx = seleccionados.indexOf(num);
            if (idx > -1) { seleccionados.splice(idx, 1); el.classList.remove('seleccionado'); }
            else { seleccionados.push(num); el.classList.add('seleccionado'); }
            document.getElementById('countSeleccion').innerText = seleccionados.length;
            validarConfig();
        }

        function guardarVenta(ws) {
            const nom = document.getElementById('nombreCliente').value || "Cliente";
            const tel = document.getElementById('whatsappCliente').value;
            const pag = document.getElementById('estadoPago').value;
            let abo = parseFloat(document.getElementById('montoAbonado').value) || 0;
            const ns = [...seleccionados];
            if(pag === 'total') abo = ns.length * config.valor;
            const idV = Date.now();
            ns.forEach(n => { rifaDatos[n] = { nombre: nom, whatsapp: tel || "S/N", pago: pag, abonoTotal: abo, numerosEnVenta: ns, idVenta: idV }; });
            guardarLocal();
            if(ws) enviarWS(nom, tel, pag, abo, ns);
            cerrarModal(); seleccionados = []; document.getElementById('countSeleccion').innerText = "0"; generarTabla();
        }

        // 1. Maneja el clic en los 3 botones nuevos
function seleccionarEstado(estado) {
    const btnDebe = document.getElementById('btnEstadoDebe');
    const btnPago = document.getElementById('btnEstadoPago');
    const btnAbono = document.getElementById('btnEstadoAbono');
    const campoMonto = document.getElementById('montoAbonado');
    const inputEstadoOculto = document.getElementById('estadoPago');
    
    const totalVenta = seleccionados.length * parseFloat(config.valor || 0);

    inputEstadoOculto.value = estado;

    // Limpiar selección visual
    [btnDebe, btnPago, btnAbono].forEach(b => {
        b.classList.remove('ring-2', 'ring-white', 'scale-105', 'bg-opacity-50');
    });

    if (estado === 'nada') {
        campoMonto.value = 0;
        campoMonto.readOnly = true;
        campoMonto.style.opacity = "0.6";
        btnDebe.classList.add('ring-2', 'ring-white', 'scale-105', 'bg-opacity-50');
    } 
    else if (estado === 'total') {
        campoMonto.value = totalVenta;
        campoMonto.readOnly = true;
        campoMonto.style.opacity = "0.6";
        btnPago.classList.add('ring-2', 'ring-white', 'scale-105', 'bg-opacity-50');
    } 
    else if (estado === 'abono') {
        // ACTIVACIÓN DEL CAMPO
        campoMonto.readOnly = false; 
        campoMonto.disabled = false; // Asegura que sea editable
        campoMonto.style.opacity = "1";
        btnAbono.classList.add('ring-2', 'ring-white', 'scale-105', 'bg-opacity-50');
        
        // Limpiar el 0 para escribir rápido
        if (parseFloat(campoMonto.value) === 0) campoMonto.value = '';
        
        // Pequeño retraso para asegurar que el teclado suba en móviles
        setTimeout(() => campoMonto.focus(), 50);
    }
}
// 2. Activa/Desactiva el botón de abono según el número que escribas
function validarMontoAbono() {
    const campoMonto = document.getElementById('montoAbonado');
    const btnAbono = document.getElementById('btnEstadoAbono');
    const valor = parseFloat(campoMonto.value) || 0;

    if (valor > 0) {
        // Si hay plata, el botón se ve "encendido"
        btnAbono.classList.remove('opacity-30', 'cursor-not-allowed');
    } else {
        // Si está en 0, se ve "apagado" pero SIGUE FUNCIONANDO el clic
        btnAbono.classList.add('opacity-30', 'cursor-not-allowed');
        
        if (document.getElementById('estadoPago').value === 'abono') {
            seleccionarEstado('nada');
        }
    }
}
        function cerrarModal() { 
    document.getElementById('modalRegistro').classList.add('hidden');
    
    // Limpieza de textos
    document.getElementById('nombreCliente').value = '';
    document.getElementById('whatsappCliente').value = '';
    
    // Resetear al estado que pediste
    const estadoPago = document.getElementById('estadoPago');
    const montoAbonado = document.getElementById('montoAbonado');
    
    estadoPago.value = 'nada'; 
    montoAbonado.value = 0;
    montoAbonado.readOnly = true;
    montoAbonado.style.opacity = "0.6";
    montoAbonado.classList.remove('hidden'); // Siempre visible al cerrar/abrir
}
        function guardarLocal() {
    // 1. Guardamos en el teléfono (como ya hacías)
    localStorage.setItem('rifa_onyx_v21', JSON.stringify(rifaDatos));

    // 2. NUEVO: Enviamos a la nube para los demás
    if (window.enviarANube) {
        window.enviarANube(rifaDatos);
    }
}
        
        function validarConfig() {
    config.nombre = document.getElementById('confNombre').value;
    config.valor = document.getElementById('confValor').value;
    config.fecha = document.getElementById('confFecha').value;
    config.rango = document.getElementById('rangoRifa').value;
    localStorage.setItem('rifa_conf_v21', JSON.stringify(config));
    
    const btn = document.getElementById('btnVender');
    
    // Si hay números seleccionados, el botón SE ACTIVA sí o sí
    if (seleccionados.length > 0) {
        btn.disabled = false;
        btn.classList.remove('bg-zinc-800', 'text-zinc-500');
        btn.classList.add('bg-emerald-600', 'text-white', 'cursor-pointer');
    } else {
        btn.disabled = true;
        btn.classList.add('bg-zinc-800', 'text-zinc-500');
        btn.classList.remove('bg-emerald-600', 'text-white', 'cursor-pointer');
    }
    actualizarDashboard();
}

        function actualizarDashboard() {
            let r = 0, d = 0, p = new Set();
            Object.keys(rifaDatos).forEach(n => {
                const v = rifaDatos[n];
                if (!p.has(v.idVenta)) {
                    const t = v.numerosEnVenta.length * config.valor;
                    const a = v.pago === 'total' ? t : v.abonoTotal;
                    r += a; d += (t - a); p.add(v.idVenta);
                }
            });
            document.getElementById('statRecaudado').innerText = `$${r.toLocaleString()}`;
            document.getElementById('statDeuda').innerText = `$${d.toLocaleString()}`;
            document.getElementById('statVendidos').innerText = Object.keys(rifaDatos).length;
            document.getElementById('statProgreso').innerText = Math.round((Object.keys(rifaDatos).length / (parseInt(config.rango)||100)) * 100) + "%";
        }

        function filtrarNumeros() {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.numero-bola').forEach(bola => {
                const ok = bola.innerText.includes(b) || (bola.dataset.cliente && bola.dataset.cliente.includes(b));
                bola.style.opacity = ok ? "1" : "0.1";
            });
        }

        function enviarWS(nom, tel, pag, abo, ns) {
    const vt = ns.length * config.valor; 
    const abonado = (pag === 'total') ? vt : abo; 
    const deuda = vt - abonado; 
    
    let fechaMostrar = config.fecha || "Por definir";
    
    if (config.fecha && config.fecha !== "Por definir") {
        // --- ARREGLO PARA LA FECHA ---
        // Reemplazamos "-" por "/" para evitar el error de zona horaria (UTC)
        let fechaAjustada = config.fecha.replace(/-/g, '\/');
        const opciones = { day: 'numeric', month: 'long', year: 'numeric' };
        
        // Creamos el objeto fecha con el ajuste
        fechaMostrar = new Date(fechaAjustada).toLocaleDateString('es-ES', opciones);
    }
    let msg = `*✨TICKET✨*%0A`;
    msg += `━━━━━━━━━━━━━━━━━━%0A`;
    msg += `👤 *Nombre:* ${nom.toUpperCase()}%0A`;
    msg += `🗓️ *Fecha:* ${fechaMostrar}%0A`;
    msg += `🔢 *N°:* ${ns.join(" ⭐ ")}%0A`;
    msg += `━━━━━━━━━━━━━━━━━━%0A`;
    msg += `💰 *Valor a pagar:* $${vt.toLocaleString()}%0A`;
    msg += `⚠️ *Favor enviar comprobante.*%0A`;
    msg += `━━━━━━━━━━━━━━━━━━%0A`;
    msg += `*💳 MEDIOS DE PAGO:*%0A`;
    msg += `• Nequi: 3226050197%0A`;
    msg += `• Daviplata: 3226050197%0A`;
    msg += `• Bancolombia: 88263229171%0A`;
    msg += `%0A🍀*¡Mucha suerte!🍀*`;

    // Abrir WhatsApp con el mensaje formateado
    window.open(`https://api.whatsapp.com/send?text=${msg}`);
}

        function enviarPendientesWhatsApp() {
    let totalDeudaGlobal = 0;
    let listaDeudores = "";
    let idsProcesados = new Set();
    
    // Recorremos los datos para agrupar por venta y calcular
    Object.keys(rifaDatos).forEach(n => {
        const v = rifaDatos[n];
        if (v.pago !== 'total' && !idsProcesados.has(v.idVenta)) {
            const totalVenta = v.numerosEnVenta.length * config.valor;
            const deudaCliente = totalVenta - v.abonoTotal;
            
            totalDeudaGlobal += deudaCliente;
            listaDeudores += `👤 *${v.nombre.toUpperCase()}*%0A`;
            listaDeudores += `🔢 Tickets: ${v.numerosEnVenta.join(", ")}%0A`;
            listaDeudores += `🚩 Debe: *$${deudaCliente.toLocaleString()}*%0A%0A`;
            
            idsProcesados.add(v.idVenta);
        }
    });

    if (totalDeudaGlobal === 0) {
        alert("¡Felicidades! No hay deudores pendientes.");
        return;
    }

    let msg = `*🔴 REPORTE DE PENDIENTES - HSA DYNAMICS*%0A`;
    msg += `━━━━━━━━━━━━━━━━━━%0A`;
    msg += `💰 *TOTAL POR COBRAR:* $${totalDeudaGlobal.toLocaleString()}%0A`;
    msg += `━━━━━━━━━━━━━━━━━━%0A%0A`;
    msg += listaDeudores;
    msg += `━━━━━━━━━━━━━━━━━━%0A`;
    msg += `*💳 MEDIOS DE PAGO:*%0A`;
    msg += `• Nequi: 3226050197%0A`;
    msg += `• Daviplata: 3226050197%0A`;
    msg += `• Bancolombia: 88263229171%0A`;
    msg += `━━━━━━━━━━━━━━━━━━%0A`;
    msg += `_Favor enviar comprobante de pago._`;

    window.open(`https://api.whatsapp.com/send?text=${msg}`);
}

        function resetearSistema() { if(confirm("¿Borrar todo?")) { rifaDatos = {}; localStorage.removeItem('rifa_onyx_v21'); generarTabla(); } }
      
      function abrirModalMulti() { 
    // 1. Muestra el modal de registro
    document.getElementById('modalRegistro').classList.remove('hidden'); 
    
    // 2. Reiniciamos los campos de texto
    document.getElementById('nombreCliente').value = '';

    validarMontoAbono();
}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSA Dynamics - Gestión de Rifas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; min-height: 100vh; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://i.ibb.co/HL9PDYfW/duende.jpg'); background-size: cover; background-position: center; opacity: 0.15; z-index: -1; }
        
        #contenedorTabla { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 5px; padding: 12px; background-color: #0a0a0a; border-radius: 15px; border: 1px solid #1a1a1a; width: 100%; }
        
        .numero-bola { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: all 0.2s ease; font-size: 0.75rem; font-weight: 900; user-select: none; border: 1px solid #1a1a1a; color: #ffffff; position: relative; overflow: hidden; text-align: center; }
        .libre { background: linear-gradient(145deg, #064e3b, #022c22); border-color: #059669; } 
        .seleccionado { background: #3b82f6 !important; border-color: #ffffff; transform: scale(1.1); z-index: 10; box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        .vendido { border-color: #71ef44; color: transparent !important; }

        #barraAccionFija { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 95%; max-width: 450px; }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        textarea, input, select { background-color: #111 !important; border: 1px solid #262626 !important; color: white !important; font-size: 12px !important; }
        
        #tooltipGlobal { position: fixed; display: none; background: rgba(10, 10, 10, 0.98); color: white; padding: 16px; border-radius: 20px; z-index: 99999; pointer-events: none; width: 260px; border: 1px solid #444; box-shadow: 0 25px 50px rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
    </style>
</head>
<body class="p-2 pb-32">
    <div id="tooltipGlobal"></div>
    
    <div class="max-w-[1200px] mx-auto">
        <div class="bg-black/80 p-4 rounded-2xl border border-[#1a1a1a] shadow-2xl mb-4 backdrop-blur-sm">
            <div class="flex justify-between items-center mb-4 border-b border-[#1a1a1a] pb-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl overflow-hidden border border-emerald-500">
                        <img id="logoApp" src="https://i.ibb.co/HL9PDYfW/duende.jpg" crossorigin="anonymous" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h1 class="text-lg font-black text-white leading-none">HSA <span class="text-emerald-500">DYNAMICS</span></h1>
                        <span class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest">Digital CRM</span>
                    </div>
                </div>
                <div class="flex gap-1 flex-wrap justify-end">
                    <button id="btnCompartir" onclick="compartirDisponibles()" class="p-2 bg-emerald-900/20 text-emerald-500 rounded-lg border border-emerald-800/30 text-[8px] font-bold uppercase">🟢 Libres</button>
                    <button onclick="enviarPendientesWhatsApp()" class="p-2 bg-rose-900/20 text-rose-500 rounded-lg border border-rose-800/30 text-[8px] font-bold uppercase">🔴 Deudores</button>
                    <button onclick="exportarPDF()" class="p-2 bg-zinc-800 text-zinc-300 rounded-lg border border-zinc-700 text-[8px] font-bold uppercase">📄 PDF</button>
                    <button onclick="resetearSistema()" class="p-2 bg-zinc-900 text-zinc-600 rounded-lg border border-zinc-800 text-[8px] font-bold uppercase">🗑️ Reset</button>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <textarea id="confNombre" oninput="validarConfig()" rows="2" placeholder="Nombre del Sorteo..." class="col-span-2 w-full p-2 rounded-xl text-xs"></textarea>
                <input type="number" id="confValor" oninput="validarConfig()" placeholder="$ Precio Ticket" class="p-2 rounded-lg text-xs">
                <input type="date" id="confFecha" oninput="validarConfig()" class="p-2 rounded-lg text-xs">
                <select id="rangoRifa" onchange="cambiarRango()" class="col-span-2 p-2 rounded-lg text-xs">
                    <option value="100">100 Números (00-99)</option>
                    <option value="1000">1000 Números (000-999)</option>
                </select>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2 mb-4 text-center">
            <div class="bg-black/70 p-2 rounded-xl border border-[#1a1a1a]"><p class="text-[8px] text-zinc-500 font-bold uppercase">Caja</p><p id="statRecaudado" class="font-black text-emerald-500 text-xs">$0</p></div>
            <div class="bg-black/70 p-2 rounded-xl border border-[#1a1a1a]"><p class="text-[8px] text-zinc-500 font-bold uppercase">Deuda</p><p id="statDeuda" class="font-black text-rose-500 text-xs">$0</p></div>
            <div class="bg-black/70 p-2 rounded-xl border border-[#1a1a1a]"><p class="text-[8px] text-zinc-500 font-bold uppercase">Venta</p><p id="statVendidos" class="font-black text-white text-xs">0</p></div>
            <div class="bg-black/70 p-2 rounded-xl border border-[#1a1a1a]"><p class="text-[8px] text-zinc-500 font-bold uppercase">Lleno</p><p id="statProgreso" class="font-black text-blue-500 text-xs">0%</p></div>
        </div>

        <input type="text" id="buscador" onkeyup="filtrarNumeros()" placeholder="🔍 Buscar cliente o número..." class="w-full bg-black/80 border border-[#1a1a1a] p-3 rounded-xl text-xs text-white mb-4 outline-none">
        
        <div id="contenedorTabla"></div>
    </div>

    <div id="barraAccionFija">
        <div class="glass p-3 rounded-[2rem] flex justify-between items-center shadow-2xl">
            <div class="flex flex-col items-center px-4">
                <span id="countSeleccion" class="text-xl font-black text-emerald-500 leading-none">0</span>
                <span class="text-[8px] uppercase font-bold text-zinc-500">Tickets</span>
            </div>
            <button onclick="abrirModalMulti()" id="btnVender" disabled class="bg-zinc-800 text-zinc-500 px-8 py-3 rounded-[1.5rem] font-black text-[10px] uppercase shadow-lg transition-all">VENDER</button>
        </div>
    </div>

    <div id="modalRegistro" class="hidden fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center p-4 z-[10000]">
        <div class="bg-[#0a0a0a] p-6 rounded-3xl border border-white/10 w-full max-w-xs shadow-2xl">
            <h2 class="text-sm font-black text-white uppercase text-center mb-4">Datos del Comprador</h2>
            <div class="space-y-3">
                <div class="flex gap-2">
                    <input type="text" id="nombreCliente" class="flex-1 p-3 rounded-xl text-xs" placeholder="Nombre completo">
                    <button onclick="seleccionarContacto()" class="bg-emerald-600/20 text-emerald-500 border border-emerald-500/30 px-3 rounded-xl text-lg">👤</button>
                </div>
                <input type="tel" id="whatsappCliente" class="w-full p-3 rounded-xl text-xs" placeholder="WhatsApp (Opcional)">
                <select id="estadoPago" onchange="toggleAbono()" class="w-full p-3 rounded-xl text-xs font-bold">
                    <option value="total">PAGÓ TODO 🟢</option>
                    <option value="abono">ABONO PARCIAL 🟡</option>
                    <option value="nada">DEBE TODO 🔴</option>
                </select>
                <input type="number" id="montoAbonado" class="hidden w-full p-3 rounded-xl border border-yellow-700/50 text-yellow-500 font-bold text-center" placeholder="Monto del abono">
                <button onclick="guardarVenta(true)" class="w-full bg-emerald-600 py-3 rounded-xl font-black text-white text-[10px] uppercase">✅ Guardar y Enviar</button>
                <button onclick="guardarVenta(false)" class="w-full bg-zinc-800 py-3 rounded-xl font-black text-zinc-400 text-[10px] uppercase border border-white/5">💾 Solo Guardar</button>
                <button onclick="cerrarModal()" class="w-full py-2 text-zinc-600 text-[9px] uppercase font-bold">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="modalPago" class="hidden fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center p-4 z-[10001]">
        <div class="bg-[#0a0a0a] p-6 rounded-3xl border border-white/10 w-full max-w-xs shadow-2xl">
            <h2 id="pagoTitulo" class="text-sm font-black text-white uppercase text-center mb-1">Cargando...</h2>
            <p id="pagoSubtitulo" class="text-[10px] text-zinc-500 text-center mb-4 italic"></p>
            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-white/5 mb-4 text-center">
                <p class="text-[9px] text-zinc-500 uppercase font-bold">Resta pagar</p>
                <p id="pagoDeudaActual" class="text-2xl font-black text-rose-500">$0</p>
            </div>
            <div class="space-y-3">
                <input type="number" id="nuevoAbonoInput" class="w-full p-3 rounded-xl text-xs" placeholder="Sumar abono...">
                <button onclick="procesarPagoParcial()" class="w-full bg-yellow-600 py-3 rounded-xl font-black text-white text-[10px] uppercase">➕ REGISTRAR ABONO</button>
                <button onclick="procesarPagoTotal()" class="w-full bg-emerald-600 py-3 rounded-xl font-black text-white text-[10px] uppercase">💰 LIQUIDAR DEUDA</button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="confirmarLiberar()" class="py-3 bg-rose-900/20 text-rose-500 rounded-xl font-bold text-[9px] uppercase border border-rose-900/30">🗑️ LIBERAR</button>
                    <button onclick="cerrarModalPago()" class="py-3 bg-zinc-800 text-zinc-400 rounded-xl font-bold text-[9px] uppercase border border-white/5">CERRAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const URL_DUENDE = "https://images.weserv.nl/?url=i.ibb.co/HL9PDYfW/duende.jpg";
        let rifaDatos = JSON.parse(localStorage.getItem('rifa_onyx_v21')) || {};
        let config = JSON.parse(localStorage.getItem('rifa_conf_v21')) || {nombre:'', valor:'', fecha:'', rango: '100'};
        let seleccionados = [];
        let numeroActivoParaPago = null;
        const tooltip = document.getElementById('tooltipGlobal');

        function inicializar() {
            document.getElementById('confNombre').value = config.nombre;
            document.getElementById('confValor').value = config.valor;
            document.getElementById('confFecha').value = config.fecha;
            document.getElementById('rangoRifa').value = config.rango;
            generarTabla();
        }

        // --- PDF AGRUPADO POR CLIENTE ---
        async function exportarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            try {
                const img = document.getElementById('logoApp');
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const base64Img = canvas.toDataURL('image/jpeg');
                doc.addImage(base64Img, 'JPEG', 14, 10, 20, 20);
            } catch (e) { console.warn("Logo no disponible"); }

            doc.setFontSize(18);
            doc.text(`REPORTES HSA DYNAMICS`, 40, 20);
            doc.setFontSize(10);
            doc.text(`Sorteo: ${config.nombre || 'N/A'}`, 40, 26);
            doc.text(`Fecha: ${config.fecha || 'N/A'}`, 40, 31);

            const filas = [];
            const idsProcesados = new Set();
            const numerosSorteados = Object.keys(rifaDatos).sort((a, b) => a - b);

            numerosSorteados.forEach(n => {
                const d = rifaDatos[n];
                // Solo procesamos una vez cada grupo de venta (idVenta)
                if (!idsProcesados.has(d.idVenta)) {
                    const vTicket = parseFloat(config.valor) || 0;
                    const cantidad = d.numerosEnVenta.length;
                    const totalVenta = cantidad * vTicket;
                    const abonado = d.pago === 'total' ? totalVenta : (d.abonoTotal || 0);
                    const deuda = totalVenta - abonado;

                    filas.push([
                        d.numerosEnVenta.join(", "), // Números comprados separados por coma
                        `$${vTicket.toLocaleString()}`,
                        d.nombre,
                        `$${abonado.toLocaleString()}`,
                        `$${deuda.toLocaleString()}`,
                        d.whatsapp || "S/N"
                    ]);
                    idsProcesados.add(d.idVenta);
                }
            });

            doc.autoTable({
                startY: 40,
                head: [['Números', 'Valor Un.', 'Cliente', 'Abono', 'Deuda', 'Celular']],
                body: filas,
                theme: 'grid',
                headStyles: { fillGray: [20, 20, 20], textColor: 255 },
                styles: { fontSize: 8 },
                columnStyles: {
                    0: { cellWidth: 35 }, // Columna de números más ancha
                    2: { fontStyle: 'bold' }
                }
            });

            doc.save(`Reporte_HSA.pdf`);
        }

        // --- TOOLTIP ---
        function mostrarTooltip(e, num) {
            const i = rifaDatos[num]; if(!i) return;
            const vt = i.numerosEnVenta.length * (parseFloat(config.valor) || 0);
            const ab = i.pago === 'total' ? vt : (i.abonoTotal || 0);
            const saldo = vt - ab;
            
            tooltip.style.display = 'block';
            tooltip.innerHTML = `
                <div class="space-y-2">
                    <div>
                        <p class="text-[10px] text-zinc-500 uppercase font-black">CLIENTE</p>
                        <p class="text-lg font-black text-white leading-tight">${i.nombre}</p>
                        <p class="text-emerald-500 text-[10px] font-bold">📱 ${i.whatsapp || 'S/N'}</p>
                    </div>
                    <div class="border-t border-zinc-800 pt-2 space-y-1">
                        <div class="flex justify-between text-[11px]"><span class="text-zinc-400 font-bold">🔢 Tickets:</span><span class="text-white font-black">${i.numerosEnVenta.join(", ")}</span></div>
                        <div class="flex justify-between text-[11px]"><span class="text-zinc-400 font-bold">💰 Total:</span><span class="text-white font-black">$${vt.toLocaleString()}</span></div>
                        <div class="flex justify-between text-[11px]"><span class="text-zinc-400 font-bold">✅ Abonado:</span><span class="text-emerald-500 font-black">$${ab.toLocaleString()}</span></div>
                    </div>
                    <div class="border-t border-zinc-800 pt-2 flex justify-between items-center"><span class="text-[10px] text-zinc-400 font-black uppercase">🚩 SALDO:</span><span class="text-lg font-black ${saldo > 0 ? 'text-rose-500' : 'text-emerald-500'}">$${saldo.toLocaleString()}</span></div>
                </div>`;
            moverTooltip(e);
        }

        function moverTooltip(e) { tooltip.style.left = (e.clientX + 15) + 'px'; tooltip.style.top = (e.clientY + 15) + 'px'; }
        function ocultarTooltip() { tooltip.style.display = 'none'; }

        // --- FUNCIONES CORE ---
        async function seleccionarContacto() {
    // Verificamos si el navegador soporta esta función
    const supported = ('contacts' in navigator && 'ContactsManager' in window);
    
    if (!supported) {
        alert("Tu navegador o dispositivo no soporta la selección de contactos directa.");
        return;
    }

    const props = ['name', 'tel'];
    try {
        const contacts = await navigator.contacts.select(props, { multiple: false });
        if (contacts.length > 0) {
            const contact = contacts[0];
            // Llenamos los campos (asegúrate que los IDs sean correctos)
            if (contact.name && contact.name.length > 0) {
                document.getElementById('nombreCliente').value = contact.name[0];
            }
            if (contact.tel && contact.tel.length > 0) {
                // Limpiamos espacios para el WhatsApp
                document.getElementById('whatsappCliente').value = contact.tel[0].replace(/\s+/g, '');
            }
        }
    } catch (ex) {
        console.log("Error o cancelación al elegir contacto:", ex);
    }
}

        function generarTabla() {
            const limite = parseInt(config.rango);
            const contenedor = document.getElementById('contenedorTabla');
            contenedor.innerHTML = '';
            for (let i = 0; i < limite; i++) {
                const numStr = i.toString().padStart(limite === 1000 ? 3 : 2, '0');
                const info = rifaDatos[numStr];
                const bola = document.createElement('div');
                bola.className = `numero-bola ${info ? 'vendido' : 'libre'}`;
                if (seleccionados.includes(numStr)) bola.classList.add('seleccionado');
                bola.dataset.cliente = info ? info.nombre.toLowerCase() : '';
                bola.innerHTML = `<span class="num-text">${numStr}</span>`;
                if (info) {
                    bola.innerHTML += `<img src="${URL_DUENDE}" crossorigin="anonymous" style="width:100%; height:100%; object-fit:cover; position:absolute; inset:0; border-radius:50%;">`;
                    bola.onclick = () => abrirGestionPago(numStr);
                    bola.onmouseenter = (e) => mostrarTooltip(e, numStr);
                    bola.onmousemove = (e) => moverTooltip(e);
                    bola.onmouseleave = () => ocultarTooltip();
                } else {
                    bola.onclick = () => manejarSeleccion(numStr, bola);
                }
                contenedor.appendChild(bola);
            }
            actualizarDashboard();
        }

        async function compartirDisponibles() {
    const btn = document.getElementById('btnCompartir');
    const textoOriginal = btn.innerText;
    btn.innerText = "⏳ Generando..."; 
    btn.disabled = true;

    const tablaOriginal = document.getElementById('contenedorTabla');
    const tablaClonada = tablaOriginal.cloneNode(true);

    const contenedorTemporal = document.createElement('div');
    contenedorTemporal.style.cssText = `
        position: absolute;
        left: -10000px;
        top: 0;
        width: 1100px;
        background-color: #050505;
        padding: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
    `;

    const titulo = document.createElement('h2');
    titulo.innerText = document.getElementById('confNombre').value || "NÚMEROS DISPONIBLES";
    titulo.style.cssText = "color: white; font-size: 36px; font-weight: 900; margin-bottom: 40px; text-transform: uppercase; text-align: center; letter-spacing: 2px;";
    contenedorTemporal.appendChild(titulo);

    tablaClonada.style.cssText = `
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 15px;
        width: 1000px;
        background: transparent;
        border: none;
    `;

    const bolasClonadas = tablaClonada.querySelectorAll('.numero-bola');
    bolasClonadas.forEach(b => {
        // DETECTAMOS EL ESTADO PARA APLICAR EL BORDE CORRECTO
        const esLibre = b.classList.contains('libre');
        
        b.style.cssText = `
            width: 85px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            /* --- BORDES LLAMATIVOS RECUPERADOS --- */
            border: 3px solid ${esLibre ? '#059669' : '#71ef44'}; 
            box-shadow: 0 0 10px ${esLibre ? 'rgba(5, 150, 105, 0.3)' : 'rgba(113, 239, 68, 0.2)'};
            background: ${esLibre ? 'linear-gradient(145deg, #064e3b, #022c22)' : '#000'};
        `;
        
        const span = b.querySelector('.num-text');
        if (span) {
            span.style.cssText = `
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 10;
                font-size: 28px;
                font-weight: 900;
                line-height: 1;
                text-align: center;
                width: 100%;
                /* Si está vendido, el número es invisible */
                ${!esLibre ? 'color: transparent !important;' : 'color: white;'}
            `;
        }

        const img = b.querySelector('img');
        if (img) {
            img.style.cssText = `
                position: absolute;
                top: 0; left: 0; width: 100%; height: 100%;
                object-fit: cover;
                z-index: 1;
                border-radius: 50%;
            `;
        }
    });

    contenedorTemporal.appendChild(tablaClonada);
    document.body.appendChild(contenedorTemporal);

    await new Promise(r => setTimeout(r, 200));

    try {
        const canvas = await html2canvas(contenedorTemporal, {
            backgroundColor: "#050505",
            scale: 2,
            useCORS: true,
            width: 1100
        });

        const dataUrl = canvas.toDataURL("image/png");
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], 'rifa_hsa.png', { type: 'image/png' });

        if (navigator.share) {
            await navigator.share({ files: [file] });
        } else {
            const link = document.createElement('a');
            link.download = 'rifa_hsa.png';
            link.href = dataUrl;
            link.click();
        }
    } catch (e) {
        console.error(e);
    } finally {
        if (contenedorTemporal.parentNode) document.body.removeChild(contenedorTemporal);
        btn.innerText = textoOriginal;
        btn.disabled = false;
    }
}
        function abrirGestionPago(num) {
            numeroActivoParaPago = num;
            const i = rifaDatos[num];
            const vt = i.numerosEnVenta.length * parseFloat(config.valor);
            const ab = i.pago === 'total' ? vt : i.abonoTotal;
            document.getElementById('pagoTitulo').innerText = i.nombre;
            document.getElementById('pagoSubtitulo').innerText = `Números: ${i.numerosEnVenta.join(", ")}`;
            document.getElementById('pagoDeudaActual').innerText = `$${(vt - ab).toLocaleString()}`;
            document.getElementById('modalPago').classList.remove('hidden');
        }

        function procesarPagoParcial() {
            const m = parseFloat(document.getElementById('nuevoAbonoInput').value); if (!m) return;
            const idV = rifaDatos[numeroActivoParaPago].idVenta;
            Object.keys(rifaDatos).forEach(n => {
                if(rifaDatos[n].idVenta === idV) {
                    rifaDatos[n].abonoTotal += m;
                    rifaDatos[n].pago = (rifaDatos[n].abonoTotal >= (rifaDatos[n].numerosEnVenta.length * config.valor)) ? 'total' : 'abono';
                }
            });
            guardarLocal(); cerrarModalPago(); generarTabla();
        }

        function procesarPagoTotal() {
            const idV = rifaDatos[numeroActivoParaPago].idVenta;
            Object.keys(rifaDatos).forEach(n => { if(rifaDatos[n].idVenta === idV) rifaDatos[n].pago = 'total'; });
            guardarLocal(); cerrarModalPago(); generarTabla();
        }

        function confirmarLiberar() {
            if(confirm("¿Liberar estos números?")) {
                const idV = rifaDatos[numeroActivoParaPago].idVenta;
                Object.keys(rifaDatos).forEach(n => { if(rifaDatos[n].idVenta === idV) delete rifaDatos[n]; });
                guardarLocal(); cerrarModalPago(); generarTabla();
            }
        }

        function cerrarModalPago() { document.getElementById('modalPago').classList.add('hidden'); }
        function manejarSeleccion(num, el) {
            const idx = seleccionados.indexOf(num);
            if (idx > -1) { seleccionados.splice(idx, 1); el.classList.remove('seleccionado'); }
            else { seleccionados.push(num); el.classList.add('seleccionado'); }
            document.getElementById('countSeleccion').innerText = seleccionados.length;
            validarConfig();
        }

        function guardarVenta(ws) {
            const nom = document.getElementById('nombreCliente').value || "Cliente";
            const tel = document.getElementById('whatsappCliente').value;
            const pag = document.getElementById('estadoPago').value;
            let abo = parseFloat(document.getElementById('montoAbonado').value) || 0;
            const ns = [...seleccionados];
            if(pag === 'total') abo = ns.length * config.valor;
            const idV = Date.now();
            ns.forEach(n => { rifaDatos[n] = { nombre: nom, whatsapp: tel || "S/N", pago: pag, abonoTotal: abo, numerosEnVenta: ns, idVenta: idV }; });
            guardarLocal();
            if(ws) enviarWS(nom, tel, pag, abo, ns);
            cerrarModal(); seleccionados = []; document.getElementById('countSeleccion').innerText = "0"; generarTabla();
        }

        function toggleAbono() { document.getElementById('montoAbonado').classList.toggle('hidden', document.getElementById('estadoPago').value !== 'abono'); }
        function abrirModalMulti() { document.getElementById('modalRegistro').classList.remove('hidden'); }
        function cerrarModal() { 
    document.getElementById('modalRegistro').classList.add('hidden');
    
    // Limpieza de campos para la siguiente venta
    document.getElementById('nombreCliente').value = '';
    document.getElementById('whatsappCliente').value = '';
    document.getElementById('montoAbonado').value = '';
    document.getElementById('estadoPago').value = 'total'; 
    document.getElementById('montoAbonado').classList.add('hidden');
}
        function guardarLocal() { localStorage.setItem('rifa_onyx_v21', JSON.stringify(rifaDatos)); }
        function cambiarRango() { config.rango = document.getElementById('rangoRifa').value; validarConfig(); generarTabla(); }
        
        function validarConfig() {
            config.nombre = document.getElementById('confNombre').value;
            config.valor = document.getElementById('confValor').value;
            config.fecha = document.getElementById('confFecha').value;
            config.rango = document.getElementById('rangoRifa').value;
            localStorage.setItem('rifa_conf_v21', JSON.stringify(config));
            const btn = document.getElementById('btnVender');
            btn.disabled = !(config.nombre && config.valor > 0 && seleccionados.length > 0);
            btn.className = btn.disabled ? "bg-zinc-800 text-zinc-500 px-8 py-3 rounded-[1.5rem] font-black text-[10px] uppercase" : "bg-emerald-600 text-white px-8 py-3 rounded-[1.5rem] font-black text-[10px] uppercase cursor-pointer";
            actualizarDashboard();
        }

        function actualizarDashboard() {
            let r = 0, d = 0, p = new Set();
            Object.keys(rifaDatos).forEach(n => {
                const v = rifaDatos[n];
                if (!p.has(v.idVenta)) {
                    const t = v.numerosEnVenta.length * config.valor;
                    const a = v.pago === 'total' ? t : v.abonoTotal;
                    r += a; d += (t - a); p.add(v.idVenta);
                }
            });
            document.getElementById('statRecaudado').innerText = `$${r.toLocaleString()}`;
            document.getElementById('statDeuda').innerText = `$${d.toLocaleString()}`;
            document.getElementById('statVendidos').innerText = Object.keys(rifaDatos).length;
            document.getElementById('statProgreso').innerText = Math.round((Object.keys(rifaDatos).length / (parseInt(config.rango)||100)) * 100) + "%";
        }

        function filtrarNumeros() {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.numero-bola').forEach(bola => {
                const ok = bola.innerText.includes(b) || (bola.dataset.cliente && bola.dataset.cliente.includes(b));
                bola.style.opacity = ok ? "1" : "0.1";
            });
        }

        function enviarWS(nom, tel, pag, abo, ns) {
            const vt = ns.length * config.valor;
            const abonado = (pag === 'total') ? vt : abo;
            const deuda = vt - abonado;
            let msg = `*🎫 TICKET HSA DYNAMICS*%0A👤 *Cliente:* ${nom}%0A🔢 *Numero:* ${ns.join(", ")}%0A💰 *Total:* $${vt.toLocaleString()}%0A✅ *Abonado:* $${abonado.toLocaleString()}%0A`;
            if (deuda > 0) msg += `🚩 *Deuda:* $${deuda.toLocaleString()}%0A`;
            msg += `%0A*💳 PAGOS:*%0A- Nequi: 3226050197%0A- Daviplata: 3226050197%0A- *Ahorros Bancolombia:* 88263229171%0A- HSA Dynamics te desea 🍀¡Suerte!`;
            window.open(`https://api.whatsapp.com/send?text=${msg}`);
        }

        function enviarPendientesWhatsApp() {
            let res = "*🚩 DEUDORES HSA DYNAMICS:*%0A"; let p = new Set();
            Object.keys(rifaDatos).forEach(n => {
                const v = rifaDatos[n];
                if (v.pago !== 'total' && !p.has(v.idVenta)) {
                    res += `%0A👤 ${v.nombre} ($${((v.numerosEnVenta.length * config.valor) - v.abonoTotal).toLocaleString()})`;
                    p.add(v.idVenta);
                }
            });
            window.open(`https://api.whatsapp.com/send?text=${res}`);
        }

        function resetearSistema() { if(confirm("¿Borrar todo?")) { rifaDatos = {}; localStorage.removeItem('rifa_onyx_v21'); generarTabla(); } }
        
        inicializar();
    </script>
</body>
</html>
